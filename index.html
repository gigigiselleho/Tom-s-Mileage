<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tom Tom Mileage Record</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyAvTX27Ej5uG8ULLjyBp6KTl37zY1tnn2I",
          authDomain: "tom-s-mileage.firebaseapp.com",
          projectId: "tom-s-mileage",
          storageBucket: "tom-s-mileage.firebasestorage.app",
          messagingSenderId: "340041994215",
          appId: "1:340041994215:web:73fdf24b13ab53c03fb742",
          measurementId: "G-QJN4NCTF9L"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const mileageCol = collection(db, "records");

        const form = document.getElementById('mileageForm');
        const tableBody = document.getElementById('recordTable');
        const totalYearlyDisplay = document.getElementById('totalYearly');

        // 實時監聽雲端數據：按照 timestamp 降序排列 (最新入的在最前)
        const q = query(mileageCol, orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            let grandTotal = 0;
            tableBody.innerHTML = '';
            window.allRecords = [];
            
            snapshot.forEach((doc) => {
                const data = doc.data();
                const id = doc.id;
                grandTotal += data.total;
                window.allRecords.push(data);
                
                const row = `<tr>
                    <td class="px-3 py-4 border-b">
                        <div class="font-bold text-gray-900 text-sm">${data.date}</div>
                        <div class="text-gray-500 text-xs">${data.purpose}</div>
                    </td>
                    <td class="px-3 py-4 border-b text-gray-600 text-xs">F: ${data.from}<br>T: ${data.to}</td>
                    <td class="px-3 py-4 border-b text-center text-gray-500 text-xs">S: ${data.start}<br>E: ${data.end}</td>
                    <td class="px-3 py-4 border-b text-center font-bold text-blue-700 bg-blue-50 border-x text-base">${data.total}</td>
                    <td class="px-3 py-4 border-b text-center">
                        <button onclick="deleteCloudRecord('${id}')" class="text-red-400 hover:text-red-600 text-lg">✕</button>
                    </td>
                </tr>`;
                tableBody.innerHTML += row;
            });
            totalYearlyDisplay.innerText = `Total Mileage: ${grandTotal.toFixed(1)} km`;
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const startV = parseFloat(document.getElementById('startKm').value);
            const endV = parseFloat(document.getElementById('endKm').value);
            const purposeSelect = document.getElementById('purposeSelect');
            const otherInput = document.getElementById('otherPurpose');
            
            let finalPurpose = purposeSelect.value === 'Other' ? `Other: ${otherInput.value}` : purposeSelect.value;

            try {
                await addDoc(mileageCol, {
                    date: document.getElementById('date').value,
                    from: document.getElementById('fromLoc').value,
                    to: document.getElementById('toLoc').value,
                    purpose: finalPurpose,
                    start: startV,
                    end: endV,
                    total: endV - startV,
                    timestamp: Date.now() // 呢個係決定排序嘅關鍵
                });
                form.reset();
                otherInput.classList.add('hidden');
            } catch (err) {
                alert("儲存失敗，請確保 Firestore Database 已開啟且設為 Test Mode。");
            }
        });

        window.deleteCloudRecord = async (id) => {
            if(confirm('確定要從雲端刪除嗎？')) {
                await deleteDoc(doc(db, "records", id));
            }
        };

        window.generateReport = () => {
            if (!window.allRecords || window.allRecords.length === 0) return alert('目前沒有紀錄！');
            let csvContent = "\uFEFF日期,From,To,用途,起始KM,結束KM,總里程\n";
            // 報告導出按日期順序
            [...window.allRecords].sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach(r => {
                csvContent += `${r.date},${r.from},${r.to},${r.purpose},${r.start},${r.end},${r.total}\n`;
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `Tom_Mileage_Report.csv`);
            link.click();
        };

        window.toggleOtherInput = () => {
            const ps = document.getElementById('purposeSelect');
            const oi = document.getElementById('otherPurpose');
            if (ps.value === 'Other') { oi.classList.remove('hidden'); oi.required = true; }
            else { oi.classList.add('hidden'); oi.required = false; }
        };
    </script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-4xl mx-auto bg-white p-6 rounded-lg shadow-md border-t-4 border-blue-600">
        <h1 class="text-3xl font-black mb-8 text-blue-900 text-center tracking-tight">Tom Tom Mileage Record 🚗</h1>
        
        <form id="mileageForm" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8 bg-gray-50 p-4 rounded-lg border border-gray-200">
            <div><label class="block text-xs font-bold text-gray-500 uppercase">日期</label><input type="date" id="date" required class="mt-1 block w-full border rounded-md p-2 w-full text-base focus:ring-2 focus:ring-blue-400"></div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase">用途</label>
                <select id="purposeSelect" onchange="toggleOtherInput()" class="mt-1 block w-full border rounded-md p-2 bg-white w-full text-base">
                    <option value="Part time">Part time</option><option value="Freelance">Freelance</option><option value="Other">Other</option>
                </select>
                <input type="text" id="otherPurpose" placeholder="Please specific" class="hidden mt-2 block w-full border rounded-md p-2 bg-yellow-50 w-full text-base">
            </div>
            <div><label class="block text-xs font-bold text-gray-500 uppercase">From</label><input type="text" id="fromLoc" required class="mt-1 block w-full border rounded-md p-2 w-full text-base"></div>
            <div><label class="block text-xs font-bold text-gray-500 uppercase">To</label><input type="text" id="toLoc" required class="mt-1 block w-full border rounded-md p-2 w-full text-base"></div>
            <div><label class="block text-xs font-bold text-gray-500 uppercase">Start KM</label><input type="number" id="startKm" required class="mt-1 block w-full border rounded-md p-2 w-full text-base"></div>
            <div><label class="block text-xs font-bold text-gray-500 uppercase">End KM</label><input type="number" id="endKm" required class="mt-1 block w-full border rounded-md p-2 w-full text-base"></div>
            <div class="md:col-span-2"><button type="submit" class="w-full bg-blue-700 text-white font-black py-4 rounded-md mt-2 text-xl shadow-lg hover:bg-blue-800 active:transform active:scale-95 transition-all uppercase tracking-widest">Add to Cloud</button></div>
        </form>

        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <h2 class="text-xl font-bold text-gray-800"> 🚗🚗 2026 Records</h2>
            <div id="totalYearly" class="text-blue-800 font-black bg-blue-100 px-6 py-3 rounded-full border-2 border-blue-200 shadow-sm">Total Mileage: 0 km</div>
            <button onclick="generateReport()" class="bg-green-600 text-white px-8 py-3 rounded-full w-full md:w-auto font-bold shadow-md hover:bg-green-700 transition-colors">Generate Report</button>
        </div>

        <div class="overflow-hidden border rounded-xl shadow-sm">
            <table class="min-w-full bg-white text-sm">
                <thead class="bg-gray-800 text-white">
                    <tr><th class="px-3 py-4 text-left font-bold uppercase tracking-wider">Date / Purpose</th><th class="px-3 py-4 text-left font-bold uppercase tracking-wider">Route</th><th class="px-3 py-4 text-center font-bold uppercase tracking-wider">S/E</th><th class="px-3 py-4 text-center bg-blue-700 text-white border-x border-blue-800 font-bold">Trip KM</th><th class="px-3 py-4 text-center">✕</th></tr>
                </thead>
                <tbody id="recordTable" class="bg-white"></tbody>
            </table>
        </div>
    </div>
</body>
</html>
