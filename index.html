  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tom Tom Mileage Record 🚗</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyAvTX27Ej5uG8ULLjyBp6KTl37zY1tnn2I",
          authDomain: "tom-s-mileage.firebaseapp.com",
          projectId: "tom-s-mileage",
          storageBucket: "tom-s-mileage.firebasestorage.app",
          messagingSenderId: "340041994215",
          appId: "1:340041994215:web:73fdf24b13ab53c03fb742",
          measurementId: "G-QJN4NCTF9L"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const mileageCol = collection(db, "records");
        const INITIAL_KM = 110597;

        const form = document.getElementById('mileageForm');
        const tableBody = document.getElementById('recordTable');
        const totalYearlyDisplay = document.getElementById('totalYearly');
        const ratioDisplay = document.getElementById('ratioDisplay');
        const submitBtn = document.getElementById('submitBtn');

        document.getElementById('date').valueAsDate = new Date();

        onSnapshot(query(mileageCol), (snapshot) => {
            let totalBusinessKM = 0;
            let latestEndKM = INITIAL_KM;
            let rawData = [];
            
            snapshot.forEach((doc) => {
                const data = doc.data();
                rawData.push({ id: doc.id, ...data });
                if (data.end && data.end > 0) {
                    totalBusinessKM += (data.end - data.start);
                    if (data.end > latestEndKM) latestEndKM = data.end;
                }
            });

            // 1. 核心邏輯：先按時間物理順序排序（由舊到新），用來對比里程連續性
            rawData.sort((a, b) => new Date(a.date) - new Date(b.date) || a.timestamp - b.timestamp);
            
            let lastEndingRef = INITIAL_KM;
            let processedRecords = rawData.map(rec => {
                // 檢查合理性：當前起點 > 任何上一筆的終點 = 斷軌
                const hasGap = rec.start > lastEndingRef;
                
                // 只有已完成的行程才更新下一次對比的基準點
                if (rec.end && rec.end > 0) {
                    lastEndingRef = rec.end;
                }
                return { ...rec, hasGap };
            });

            // 2. 顯示排序：Pending 放在最頂，其餘按公里數降序排列
            processedRecords.sort((a, b) => {
                const aFinished = a.end && a.end > 0;
                const bFinished = b.end && b.end > 0;
                if (!aFinished && bFinished) return -1;
                if (aFinished && !bFinished) return 1;
                return b.end - a.end; 
            });

            window.allRecords = processedRecords; 
            tableBody.innerHTML = '';
            
            processedRecords.forEach((data) => {
                const id = data.id;
                const isOngoing = !data.end || data.end === 0;
                
                // 決定顏色：斷軌則顯示淺紅色背景
                let rowBg = "bg-white";
                if (isOngoing) rowBg = "bg-amber-50 animate-pulse";
                else if (data.hasGap) rowBg = "bg-red-100"; 

                const row = `
                <tr class="${rowBg} transition-colors">
                    <td class="px-3 py-4 border-b">
                        <div class="font-bold text-slate-900 text-sm">${data.date}</div>
                        <div class="text-slate-500 text-xs">${data.purpose}</div>
                    </td>
                    <td class="px-3 py-4 border-b text-slate-600 text-xs text-left">
                        <div class="mb-1"><span class="font-bold text-slate-400 uppercase">From:</span> ${data.from}</div>
                        <div><span class="font-bold text-slate-400 uppercase">To:</span> ${data.to}</div>
                    </td>
                    <td class="px-3 py-4 border-b text-center text-slate-500 text-xs">
                        S: ${data.start}<br>E: ${isOngoing ? '---' : data.end}
                        ${(!isOngoing && data.hasGap) ? '<br><span class="text-red-600 font-bold text-[9px]">⚠️ GAP</span>' : ''}
                    </td>
                    <td class="px-3 py-4 border-b text-center font-bold text-blue-700 ${(!isOngoing && data.hasGap) ? 'bg-red-200' : 'bg-blue-50'} border-x text-base">
                        ${isOngoing ? '<span class="text-amber-600 italic text-[10px]">PENDING</span>' : (data.end - data.start).toFixed(1)}
                    </td>
                    <td class="px-3 py-4 border-b text-center">
                        <div class="flex flex-col items-center gap-2">
                            ${isOngoing ? `<button onclick="fillEnd('${id}')" class="bg-amber-500 text-white w-full py-1 rounded shadow-sm text-[10px] font-black uppercase">Finish</button>` : ''}
                            <div class="flex gap-2">
                                <button onclick="editRecord('${id}')" class="bg-blue-600 text-white p-2 rounded-lg shadow-sm hover:bg-blue-700">
                                    <span class="text-sm">✎</span>
                                </button>
                                <button onclick="deleteCloudRecord('${id}')" class="bg-red-500 text-white p-2 rounded-lg shadow-sm hover:bg-red-600">
                                    <span class="text-sm">❌</span>
                                </button>
                            </div>
                        </div>
                    </td>
                </tr>`;
                tableBody.innerHTML += row;
            });

            const totalDriven = latestEndKM - INITIAL_KM;
            const ratio = totalDriven > 0 ? ((totalBusinessKM / totalDriven) * 100).toFixed(1) : 0;

            totalYearlyDisplay.innerText = `Business: ${totalBusinessKM.toFixed(1)} km`;
            ratioDisplay.innerText = `Business Mileage Ratio: ${ratio}%`;
        });

        window.editRecord = (id) => {
            const record = window.allRecords.find(r => r.id === id);
            if (!record) return;
            document.getElementById('date').value = record.date;
            document.getElementById('fromLoc').value = record.from;
            document.getElementById('toLoc').value = record.to;
            document.getElementById('startKm').value = record.start;
            document.getElementById('endKm').value = record.end || "";
            document.getElementById('purposeSelect').value = record.purpose;
            window.editingId = id;
            submitBtn.innerText = "Update Record ✎";
            submitBtn.classList.replace('bg-blue-700', 'bg-blue-500');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.fillEnd = (id) => {
            editRecord(id);
            document.getElementById('endKm').focus();
            submitBtn.innerText = "Complete Trip & Update ✅";
            submitBtn.classList.replace('bg-blue-500', 'bg-amber-600');
        };

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                date: document.getElementById('date').value,
                from: document.getElementById('fromLoc').value,
                to: document.getElementById('toLoc').value,
                start: parseFloat(document.getElementById('startKm').value),
                end: parseFloat(document.getElementById('endKm').value) || 0,
                purpose: document.getElementById('purposeSelect').value === 'Other' ? document.getElementById('otherPurpose').value : document.getElementById('purposeSelect').value
            };

            try {
                if (window.editingId) {
                    await updateDoc(doc(db, "records", window.editingId), data);
                    window.editingId = null;
                } else {
                    await addDoc(mileageCol, { ...data, timestamp: Date.now() });
                }
                form.reset();
                document.getElementById('date').valueAsDate = new Date();
                submitBtn.innerText = "Start Trip / Add Record";
                submitBtn.className = "w-full bg-blue-700 text-white font-black py-4 rounded-2xl text-lg shadow-xl uppercase tracking-widest";
            } catch (err) { alert("Error: " + err.message); }
        });

        window.deleteCloudRecord = async (id) => {
            if(confirm('Delete?')) await deleteDoc(doc(db, "records", id));
        };

        window.generateReport = () => {
            let csvContent = "\uFEFFDate,From,To,Purpose,Start,End,Total\n";
            window.allRecords.filter(r => r.end > 0).forEach(r => {
                csvContent += `${r.date},${r.from},${r.to},${r.purpose},${r.start},${r.end},${(r.end - r.start).toFixed(1)}\n`;
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", "TomTom_Mileage_2026.csv");
            link.click();
        };

        window.toggleOtherInput = () => {
            document.getElementById('otherPurpose').classList.toggle('hidden', document.getElementById('purposeSelect').value !== 'Other');
        };
    </script>
</head>
<body class="bg-slate-50 p-3 font-sans text-slate-800">
    <div class="max-w-4xl mx-auto bg-white p-5 rounded-3xl shadow-2xl border-t-8 border-blue-700">
        <h1 class="text-2xl font-black mb-6 text-blue-900 text-center tracking-tighter italic uppercase">Tom Tom Mileage Record 🚗</h1>
        
        <form id="mileageForm" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8 bg-slate-100 p-5 rounded-2xl border border-slate-200">
            <div><label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest">Date</label><input type="date" id="date" required class="mt-1 block w-full border-slate-300 rounded-xl p-3 text-base"></div>
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest">Purpose</label>
                <select id="purposeSelect" onchange="toggleOtherInput()" class="mt-1 block w-full border-slate-300 rounded-xl p-3 bg-white text-base">
                    <option value="Part time">Part time</option><option value="Freelance">Freelance</option><option value="Other">Other (Specify)</option>
                </select>
                <input type="text" id="otherPurpose" placeholder="Describe..." class="hidden mt-2 block w-full border-blue-200 rounded-xl p-3 bg-blue-50">
            </div>
            <div><label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest">From</label><input type="text" id="fromLoc" required class="mt-1 block w-full border-slate-300 rounded-xl p-3" placeholder="Starting point"></div>
            <div><label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest">To</label><input type="text" id="toLoc" required class="mt-1 block w-full border-slate-300 rounded-xl p-3" placeholder="Destination"></div>
            <div><label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest">Start KM</label><input type="number" id="startKm" required class="mt-1 block w-full border-slate-300 rounded-xl p-3"></div>
            <div><label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest">End KM</label><input type="number" id="endKm" class="mt-1 block w-full border-slate-300 rounded-xl p-3" placeholder="Enter after trip"></div>
            <div class="md:col-span-2 pt-2"><button type="submit" id="submitBtn" class="w-full bg-blue-700 text-white font-black py-4 rounded-2xl text-lg shadow-xl uppercase tracking-widest">Start Trip / Add Record</button></div>
        </form>

        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <h2 class="text-lg font-black text-slate-700 uppercase tracking-tight">🚗🚗2026 record</h2>
            <div class="flex gap-2">
                <div id="totalYearly" class="text-blue-900 font-black bg-blue-50 px-4 py-2 rounded-full border border-blue-100 text-[10px] shadow-sm">Business: 0 km</div>
                <div id="ratioDisplay" class="text-emerald-700 font-black bg-emerald-50 px-4 py-2 rounded-full border border-emerald-100 text-[10px] shadow-sm">Business Mileage Ratio: 0%</div>
            </div>
            <button onclick="generateReport()" class="bg-slate-800 text-white px-6 py-2 rounded-full font-bold text-[10px] uppercase tracking-widest hover:bg-black">Export CSV</button>
        </div>

        <div class="overflow-hidden border border-slate-200 rounded-2xl shadow-sm">
            <table class="min-w-full bg-white text-sm">
                <thead class="bg-slate-900 text-white text-center uppercase tracking-widest text-[10px]">
                    <tr><th class="px-3 py-4 text-left">Info</th><th class="px-3 py-4 text-left">Route</th><th class="px-3 py-4">KM</th><th class="px-3 py-4 bg-blue-800">Trip</th><th class="px-3 py-4">Action</th></tr>
                </thead>
                <tbody id="recordTable" class="text-center divide-y divide-slate-100"></tbody>
            </table>
        </div>
    </div>
</body>
</html>
