<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tom Tom Mileage Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyAvTX27Ej5uG8ULLjyBp6KTl37zY1tnn2I",
          authDomain: "tom-s-mileage.firebaseapp.com",
          projectId: "tom-s-mileage",
          storageBucket: "tom-s-mileage.firebasestorage.app",
          messagingSenderId: "340041994215",
          appId: "1:340041994215:web:73fdf24b13ab53c03fb742",
          measurementId: "G-QJN4NCTF9L"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const mileageCol = collection(db, "records");

        const form = document.getElementById('mileageForm');
        const tableBody = document.getElementById('recordTable');
        const totalYearlyDisplay = document.getElementById('totalYearly');
        const submitBtn = document.getElementById('submitBtn');

        document.getElementById('date').valueAsDate = new Date();

        onSnapshot(query(mileageCol, orderBy("timestamp", "desc")), (snapshot) => {
            let grandTotal = 0;
            tableBody.innerHTML = '';
            window.allRecords = [];
            
            snapshot.forEach((doc) => {
                const data = doc.data();
                const id = doc.id;
                const isOngoing = !data.end || data.end === 0;
                
                if (!isOngoing) grandTotal += data.total;
                window.allRecords.push({id, ...data});
                
                const row = `
                <tr class="${isOngoing ? 'bg-amber-50 animate-pulse' : ''}">
                    <td class="px-3 py-4 border-b">
                        <div class="font-bold text-slate-900 text-sm">${data.date}</div>
                        <div class="text-slate-500 text-xs">${data.purpose}</div>
                    </td>
                    <td class="px-3 py-4 border-b text-slate-600 text-xs text-left">
                        <div class="mb-1"><span class="font-bold text-slate-400">FROM:</span> ${data.from}</div>
                        <div><span class="font-bold text-slate-400">TO:</span> ${data.to}</div>
                    </td>
                    <td class="px-3 py-4 border-b text-center text-slate-500 text-xs">
                        S: ${data.start}<br>E: ${isOngoing ? '<span class="text-amber-600 font-bold">---</span>' : data.end}
                    </td>
                    <td class="px-3 py-4 border-b text-center font-bold text-blue-700 bg-blue-50 border-x text-base">
                        ${isOngoing ? '<span class="text-slate-300 italic text-xs uppercase tracking-tighter">Pending</span>' : data.total}
                    </td>
                    <td class="px-3 py-4 border-b text-center">
                        ${isOngoing ? `<button onclick="fillEnd('${id}', '${data.from}', '${data.to}', ${data.start})" class="bg-amber-500 text-white px-4 py-1.5 rounded-lg text-xs font-black mb-2 shadow-md hover:bg-amber-600">FINISH</button><br>` : ''}
                        <button onclick="deleteCloudRecord('${id}')" class="text-slate-300 hover:text-red-500 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    </td>
                </tr>`;
                tableBody.innerHTML += row;
            });
            totalYearlyDisplay.innerText = `Total: ${grandTotal.toFixed(1)} km`;
        });

        window.fillEnd = (id, from, to, start) => {
            document.getElementById('fromLoc').value = from;
            document.getElementById('toLoc').value = to;
            document.getElementById('startKm').value = start;
            document.getElementById('endKm').focus();
            window.editingId = id;
            submitBtn.innerText = "Complete Trip & Update";
            submitBtn.classList.replace('bg-blue-700', 'bg-amber-600');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const date = document.getElementById('date').value;
            const from = document.getElementById('fromLoc').value;
            const to = document.getElementById('toLoc').value;
            const startV = parseFloat(document.getElementById('startKm').value);
            const endV = parseFloat(document.getElementById('endKm').value) || 0;
            const purposeSelect = document.getElementById('purposeSelect');
            const otherInput = document.getElementById('otherPurpose');
            let finalPurpose = purposeSelect.value === 'Other' ? otherInput.value : purposeSelect.value;

            try {
                if (window.editingId) {
                    await updateDoc(doc(db, "records", window.editingId), {
                        end: endV,
                        total: endV - startV
                    });
                    window.editingId = null;
                    submitBtn.innerText = "Start Trip / Add Record";
                    submitBtn.classList.replace('bg-amber-600', 'bg-blue-700');
                } else {
                    await addDoc(mileageCol, {
                        date: date,
                        from: from,
                        to: to,
                        purpose: finalPurpose,
                        start: startV,
                        end: endV,
                        total: endV ? (endV - startV) : 0,
                        timestamp: Date.now()
                    });
                }
                form.reset();
                document.getElementById('date').valueAsDate = new Date();
                otherInput.classList.add('hidden');
            } catch (err) {
                alert("Error: " + err.message);
            }
        });

        window.deleteCloudRecord = async (id) => {
            if(confirm('Delete this record?')) await deleteDoc(doc(db, "records", id));
        };

        window.generateReport = () => {
            if (!window.allRecords || window.allRecords.length === 0) return alert('No records!');
            let csvContent = "\uFEFFDate,From,To,Purpose,Start,End,Total\n";
            window.allRecords.filter(r => r.end > 0).sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach(r => {
                csvContent += `${r.date},${r.from},${r.to},${r.purpose},${r.start},${r.end},${r.total}\n`;
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", "Mileage_2026_Export.csv");
            link.click();
        };

        window.toggleOtherInput = () => {
            const ps = document.getElementById('purposeSelect'), oi = document.getElementById('otherPurpose');
            oi.classList.toggle('hidden', ps.value !== 'Other');
        };
    </script>
</head>
<body class="bg-slate-50 p-3 font-sans text-slate-800">
    <div class="max-w-4xl mx-auto bg-white p-5 rounded-3xl shadow-2xl border-t-8 border-blue-700">
        <h1 class="text-2xl font-black mb-6 text-blue-900 text-center tracking-tighter italic">TOM TOM MILEAGE 🚗</h1>
        
        <form id="mileageForm" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8 bg-slate-100 p-5 rounded-2xl border border-slate-200">
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest">Date</label>
                <input type="date" id="date" required class="mt-1 block w-full border-slate-300 rounded-xl p-3 text-base">
            </div>
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest">Purpose</label>
                <select id="purposeSelect" onchange="toggleOtherInput()" class="mt-1 block w-full border-slate-300 rounded-xl p-3 bg-white text-base">
                    <option value="Part time">Part time</option>
                    <option value="Freelance">Freelance</option>
                    <option value="Other">Other (Specify)</option>
                </select>
                <input type="text" id="otherPurpose" placeholder="Describe purpose..." class="hidden mt-2 block w-full border-blue-200 rounded-xl p-3 bg-blue-50">
            </div>
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest">From</label>
                <input type="text" id="fromLoc" placeholder="Starting Point" required class="mt-1 block w-full border-slate-300 rounded-xl p-3 text-base">
            </div>
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest">To</label>
                <input type="text" id="toLoc" placeholder="Destination" required class="mt-1 block w-full border-slate-300 rounded-xl p-3 text-base">
            </div>
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest">Start KM</label>
                <input type="number" id="startKm" placeholder="Current Odometer" required class="mt-1 block w-full border-slate-300 rounded-xl p-3 text-base">
            </div>
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest">End KM <span class="text-slate-300 font-normal">(Fill later)</span></label>
                <input type="number" id="endKm" placeholder="Final Odometer" class="mt-1 block w-full border-slate-300 rounded-xl p-3 text-base">
            </div>
            <div class="md:col-span-2 pt-2">
                <button type="submit" id="submitBtn" class="w-full bg-blue-700 text-white font-black py-4 rounded-2xl text-lg shadow-xl hover:bg-blue-800 transition-all uppercase tracking-widest">Start Trip / Add Record</button>
            </div>
        </form>

        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <h2 class="text-lg font-black text-slate-700 uppercase tracking-tight">🚗🚗2026 record</h2>
            <div id="totalYearly" class="text-blue-900 font-black bg-blue-50 px-5 py-2.5 rounded-full border border-blue-100 text-sm">TOTAL: 0 km</div>
            <button onclick="generateReport()" class="bg-slate-800 text-white px-6 py-2 rounded-full font-bold text-xs uppercase tracking-widest hover:bg-black transition-all">Export</button>
        </div>

        <div class="overflow-hidden border border-slate-200 rounded-2xl shadow-sm">
            <table class="min-w-full bg-white text-sm">
                <thead class="bg-slate-900 text-white text-center uppercase tracking-widest text-[10px]">
                    <tr>
                        <th class="px-3 py-4 text-left">Info</th>
                        <th class="px-3 py-4 text-left">Route</th>
                        <th class="px-3 py-4">KM</th>
                        <th class="px-3 py-4 bg-blue-800">Trip</th>
                        <th class="px-3 py-4">Action</th>
                    </tr>
                </thead>
                <tbody id="recordTable" class="text-center divide-y divide-slate-100"></tbody>
            </table>
        </div>
    </div>
</body>
</html>
